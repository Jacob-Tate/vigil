<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="11" fill="#2563eb"/>
  <!-- Eye glow -->
  <ellipse cx="24" cy="24" rx="15" ry="8.5" fill="white" opacity="0.08"/>
  <!-- Eye outline -->
  <path d="M6 24 C11 15 37 15 42 24 C37 33 11 33 6 24 Z"
        stroke="white" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
  <!-- Iris ring -->
  <circle cx="24" cy="24" r="6.5" stroke="white" stroke-width="1.6" fill="none"/>
  <!-- Pupil -->
  <circle cx="24" cy="24" r="3" fill="white"/>
  <!-- Catchlight -->
  <circle cx="26" cy="22" r="1.1" fill="#2563eb"/>
</svg>
