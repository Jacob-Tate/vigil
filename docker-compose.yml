services:
  vigil:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - vigil-data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - NOTIFICATIONS_ENCRYPTION_KEY=${NOTIFICATIONS_ENCRYPTION_KEY:-}
      - SESSION_DURATION_HOURS=${SESSION_DURATION_HOURS:-24}
      - BASE_URL=${BASE_URL:?BASE_URL is required}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-}
      - ALERT_COOLDOWN_SECONDS=${ALERT_COOLDOWN_SECONDS:-3600}
      - NVD_SYNC_INTERVAL_HOURS=${NVD_SYNC_INTERVAL_HOURS:-2}
      - DIFF_RETENTION_DAYS=${DIFF_RETENTION_DAYS:-30}
      - BROWSER_EXECUTABLE_PATH=${BROWSER_EXECUTABLE_PATH:-}
    restart: unless-stopped

volumes:
  vigil-data:
